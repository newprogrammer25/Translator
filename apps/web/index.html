<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#070512" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Premium AI-powered translation with real-time speech, dialogue practice, and call interpretation." />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Translator — AI Translation Platform</title>
    <style>
      /* Inline splash to avoid FOUC — removed by React once app mounts */
      .splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.25rem;
        background-color: #070512;
        background-image:
          radial-gradient(ellipse at 20% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 0%, rgba(20, 184, 166, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 100%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
        transition: opacity 500ms cubic-bezier(0.32, 0.72, 0, 1), transform 500ms cubic-bezier(0.32, 0.72, 0, 1);
      }
      .splash-screen.fade-out {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }
      .splash-icon {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        background: linear-gradient(135deg, #14b8a6 0%, #2dd4bf 35%, #8b5cf6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 60px -16px rgba(20, 184, 166, 0.5);
        animation: splashBreath 2s ease-in-out infinite;
      }
      .splash-icon svg {
        width: 32px;
        height: 32px;
        color: #070512;
      }
      .splash-brand {
        text-align: center;
      }
      .splash-brand h1 {
        margin: 0;
        font-family: "Inter Tight", Inter, system-ui, sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: white;
      }
      .splash-brand p {
        margin: 0.25rem 0 0;
        font-family: Inter, system-ui, sans-serif;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(148, 163, 184, 0.6);
      }
      .splash-loader {
        display: flex;
        gap: 6px;
        margin-top: 0.75rem;
      }
      .splash-loader span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(94, 234, 212, 0.8);
        animation: splashDot 1.4s ease-in-out infinite;
      }
      .splash-loader span:nth-child(2) { animation-delay: 0.2s; }
      .splash-loader span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashBreath {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes splashDot {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
        40% { opacity: 1; transform: scale(1.2); }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-icon, .splash-loader span { animation: none; }
      }
    </style>
  </head>
  <body>
    <!-- Splash shown while JS loads -->
    <div id="splash" class="splash-screen">
      <div class="splash-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
          <path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
        </svg>
      </div>
      <div class="splash-brand">
        <h1>Translator</h1>
        <p>AI Translation Platform</p>
      </div>
      <div class="splash-loader">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
