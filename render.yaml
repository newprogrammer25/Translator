# Render.com one-click deploy for the SayMi-style translator backend.
# Docs: https://render.com/docs/blueprint-spec
#
# Steps:
#   1. Push this repo to GitHub.
#   2. In Render: New + → Blueprint → connect this repo → Apply.
#   3. Set GROQ_API_KEY in the service env (the Blueprint marks it sync:false
#      so Render will prompt you for it during apply).
#
# The frontend is hosted as a separate static site; once the backend URL
# is live, set VITE_API_BASE in apps/web/.env and rebuild apps/web.
services:
  - type: web
    name: translator-server
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: "*"
